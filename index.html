<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Pyramid | Precision Browsing</title>
    <!-- Service Worker pour le mode hors-ligne -->
    <script>
        /* Enregistrement du Service Worker (fichier sw.js requis) */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('[SW] Enregistré:', reg.scope))
                    .catch(err => console.warn('[SW] Echec (normal en file://):', err));
            });
        }
    </script>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts locales -->
    <link rel="stylesheet" href="fonts/fonts.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="font-awesome/all.css">
    
    <script>
        // Configuration
        const WEATHER_CONFIG = {
            city: 'Douala',
            country: 'CM',
            lat: 4.0511,
            lon: 9.7679
        };

        // Update clock
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('date').textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }

        // Map WMO weather codes to Font Awesome icons
        const WEATHER_ICONS = {
            0: 'fa-sun', 1: 'fa-cloud-sun', 2: 'fa-cloud-sun',
            3: 'fa-cloud', 45: 'fa-smog', 48: 'fa-smog',
            51: 'fa-cloud-rain', 53: 'fa-cloud-rain', 55: 'fa-cloud-rain',
            61: 'fa-cloud-rain', 63: 'fa-cloud-rain', 65: 'fa-cloud-rain',
            71: 'fa-snowflake', 73: 'fa-snowflake', 75: 'fa-snowflake', 77: 'fa-snowflake',
            80: 'fa-cloud-rain', 81: 'fa-cloud-rain', 82: 'fa-cloud-rain',
            95: 'fa-bolt', 96: 'fa-bolt', 99: 'fa-bolt'
        };

        function applyWeather(temp, iconCode) {
            document.getElementById('temperature').textContent = `${Math.round(temp)}°C`;
            const weatherIconEl = document.getElementById('weather-icon');
            if (weatherIconEl) {
                weatherIconEl.innerHTML = `<i class="fas ${iconCode}"></i>`;
            }
        }

        function loadCachedWeather() {
            try {
                const cached = localStorage.getItem('pyramid_weather');
                if (!cached) return false;
                const { temp, icon, timestamp } = JSON.parse(cached);
                applyWeather(temp, icon);
                return true;
            } catch { return false; }
        }

        // Fetch weather from Open-Meteo API (no API key required)
        async function fetchWeather() {
            // Afficher d'abord le cache si disponible
            loadCachedWeather();
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${WEATHER_CONFIG.lat}&longitude=${WEATHER_CONFIG.lon}&current_weather=true`
                );
                const data = await response.json();
                const weather = data.current_weather;
                const iconCode = WEATHER_ICONS[weather.weathercode] || 'fa-sun';
                applyWeather(weather.temperature, iconCode);
                // Sauvegarder en cache
                localStorage.setItem('pyramid_weather', JSON.stringify({
                    temp: weather.temperature,
                    icon: iconCode,
                    timestamp: Date.now()
                }));
            } catch (error) {
                console.warn('[Météo] Hors-ligne — affichage du cache');
                if (!loadCachedWeather()) {
                    document.getElementById('temperature').textContent = '--°C';
                    const weatherIconEl = document.getElementById('weather-icon');
                    if (weatherIconEl) weatherIconEl.innerHTML = '<i class="fas fa-cloud-slash"></i>';
                }
            }
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            const bgImage = document.getElementById('bgImage');
            const customBtn = document.getElementById('customBtn');
            const themePanel = document.getElementById('themePanel');
            const closePanel = document.getElementById('closePanel');
            const darkModeBtn = document.getElementById('darkModeBtn');
            const lightModeBtn = document.getElementById('lightModeBtn');
            const items = document.querySelectorAll('.theme-item');

            let isOpen = false;
            let currentMode = 'dark';

            // Detect system theme preference
            function getSystemTheme() {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                    return 'light';
                }
                return 'dark';
            }

            // Apply solid background based on mode
            function applySolidBackground(mode) {
                const solidBg = document.getElementById('solidBg');
                const bgImage = document.getElementById('bgImage');
                
                bgImage.style.opacity = '0';
                
                if (mode === 'light') {
                    // Light solid background with green radial glow
                    solidBg.style.background = 'linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%)';
                    solidBg.querySelector('div').style.background = 'rgba(99, 220, 174, 0.25)';
                    solidBg.style.opacity = '1';
                } else {
                    // Dark solid background with green radial glow
                    solidBg.style.background = 'linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%)';
                    solidBg.querySelector('div').style.background = 'rgba(99, 220, 174, 0.15)';
                    solidBg.style.opacity = '1';
                }
            }

            // Toggle panel
            customBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                isOpen = !isOpen;
                themePanel.style.transform = isOpen ? 'translateY(0)' : 'translateY(100%)';
            });

            // Close panel
            closePanel.addEventListener('click', () => {
                isOpen = false;
                themePanel.style.transform = 'translateY(100%)';
            });

            // Close panel when clicking outside
            document.addEventListener('click', (e) => {
                if (isOpen && !themePanel.contains(e.target) && !customBtn.contains(e.target)) {
                    isOpen = false;
                    themePanel.style.transform = 'translateY(100%)';
                }
            });

            // Mode toggle (Dark/Light)
            darkModeBtn.addEventListener('click', () => {
                currentMode = 'dark';
                darkModeBtn.classList.add('active');
                lightModeBtn.classList.remove('active');
                
                // If "None" theme is active, apply dark background immediately
                const savedTheme = localStorage.getItem('selectedTheme');
                if (savedTheme === 'none') {
                    applySolidBackground('dark');
                }
                
                filterThemes('dark');
            });

            lightModeBtn.addEventListener('click', () => {
                currentMode = 'light';
                lightModeBtn.classList.add('active');
                darkModeBtn.classList.remove('active');
                
                // If "None" theme is active, apply light background immediately
                const savedTheme = localStorage.getItem('selectedTheme');
                if (savedTheme === 'none') {
                    applySolidBackground('light');
                }
                
                filterThemes('light');
            });

            // Filter themes by mode
            function filterThemes(mode) {
                items.forEach(item => {
                    const theme = item.getAttribute('data-theme');
                    if (theme !== mode) {
                        item.classList.add('hidden');
                    } else {
                        item.classList.remove('hidden');
                    }
                });
            }

            // Load saved theme
            const savedTheme = localStorage.getItem('selectedTheme');
            const savedMode = localStorage.getItem('themeMode');
            const solidBg = document.getElementById('solidBg');
            
            // First visit - use system theme
            if (!savedTheme) {
                const systemTheme = getSystemTheme();
                currentMode = systemTheme;
                applySolidBackground(systemTheme);
                
                // Set mode buttons
                if (systemTheme === 'light') {
                    lightModeBtn.classList.add('active');
                    darkModeBtn.classList.remove('active');
                } else {
                    darkModeBtn.classList.add('active');
                    lightModeBtn.classList.remove('active');
                }
                
                // Mark "None" theme as active
                const noneItem = document.querySelector('.theme-item[data-bg="none"]');
                if (noneItem) {
                    noneItem.classList.add('active');
                }
            } else {
                // Restore saved theme
                if (savedTheme === 'none') {
                    applySolidBackground(savedMode);
                    currentMode = savedMode || 'dark';
                } else {
                    solidBg.style.opacity = '0';
                    bgImage.src = savedTheme;
                    bgImage.style.opacity = '0.6';
                    currentMode = savedMode || 'dark';
                }
                
                // Set mode buttons
                if (currentMode === 'light') {
                    lightModeBtn.classList.add('active');
                } else {
                    darkModeBtn.classList.add('active');
                }
            }

            // Handle theme click
            items.forEach(item => {
                const bg = item.getAttribute('data-bg');

                // Restore active state
                if (bg === savedTheme) {
                    item.classList.add('active');
                }

                item.addEventListener('click', () => {
                    // Remove old active
                    items.forEach(i => i.classList.remove('active'));

                    // Add active
                    item.classList.add('active');

            // Handle "None" theme (solid background)
                    if (bg === 'none') {
                        applySolidBackground(currentMode);
                        localStorage.setItem('selectedTheme', 'none');
                        localStorage.setItem('themeMode', currentMode);
                    } else {
                        // Hide solid background and show image
                        const solidBg = document.getElementById('solidBg');
                        solidBg.style.opacity = '0';
                        
                        // Animate background with scale effect
                        bgImage.style.opacity = "0";
                        bgImage.style.transform = "scale(1.05)";

                        setTimeout(() => {
                            bgImage.src = bg;
                            bgImage.style.opacity = "0.6";
                            bgImage.style.transform = "scale(1)";
                        }, 200);

                        // Save
                        localStorage.setItem('selectedTheme', bg);
                        localStorage.setItem('themeMode', currentMode);
                    }
                });
            });

            // Initial filter
            filterThemes(currentMode);

            // Listen for system theme changes
            window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
                const savedTheme = localStorage.getItem('selectedTheme');
                if (savedTheme === 'none') {
                    currentMode = e.matches ? 'light' : 'dark';
                    applySolidBackground(currentMode);
                    localStorage.setItem('themeMode', currentMode);
                }
            });

            document.body.classList.add('loaded');
            updateClock();
            fetchWeather();
            setInterval(updateClock, 1000);
            setInterval(fetchWeather, 600000);
        });
    </script>
    <style>
        /* Smooth page load */
        body {
            opacity: 0;
            transform: scale(1.02);
            transition: all 0.8s ease;
        }

        body.loaded {
            opacity: 1;
            transform: scale(1);
        }

        /* Clock glow */
        .clock-glow {
            background: linear-gradient(90deg, #63dcae, #06b6d4);
            -webkit-background-clip: text;
            color: transparent;
            /* Fix horloge - largeur suffisante pour ne pas couper les chiffres */
            display: inline-block;
            min-width: 283px;
        }

        /* Weather widget mobile - taille réduite */
        @media (max-width: 640px) {
            .glass-widget {
                padding: 6px 10px !important;
                gap: 8px !important;
            }
            #temperature {
                font-size: 12px !important;
            }
            #weather-icon {
                font-size: 16px !important;
            }
            #weather-icon i {
                font-size: 16px !important;
            }
            .glass-widget p.text-\[10px\] {
                font-size: 7px !important;
                letter-spacing: 0.05em !important;
            }
        }

        /* Font Awesome icons */
        .fas, .far, .fab, .fa {
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            display: inline-block;
            font-style: normal;
            line-height: 1;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .fa-solid { font-weight: 900; }
        .fa-regular { font-weight: 400; }
        .fa-brands { 
            font-family: "Font Awesome 6 Brands";
            font-weight: 400; 
        }
        
        /* Fallback si Font Awesome ne charge pas - utiliser SVG inline */
        #weather-icon i,
        .mode-btn i,
        #closePanel i {
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* Card tilt effect */
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: rotateX(5deg) rotateY(5deg) translateY(-6px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* Icon hover upgrade */
        .icon-hover:hover {
            transform: translateY(-4px) scale(1.1);
        }

        /* Search glow */
        .search-focus:focus-within {
            box-shadow: 0 0 25px rgba(99,220,174,0.3);
            border-color: rgba(99,220,174,0.5);
        }

        /* Smooth transitions global */
        * {
            transition: all 0.2s ease;
        }

        /* Smooth background transition */
        .fixed.inset-0 img {
            transition: opacity 0.5s ease;
        }

        /* Background image class */
        .bg-image {
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        /* Scroll horizontal stylé */
        #themePanel::-webkit-scrollbar {
            height: 6px;
        }

        #themePanel::-webkit-scrollbar-thumb {
            background: rgba(99,220,174,0.3);
            border-radius: 10px;
        }

        /* Active theme */
        .theme-item.active .active-indicator {
            opacity: 1;
            box-shadow: 0 0 20px rgba(99,220,174,0.6);
        }

        /* Smooth selection */
        .theme-item {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .theme-item:hover {
            transform: scale(1.05);
        }

        /* Mode button active state */
        .mode-btn.active {
            border-color: rgba(99, 220, 174, 0.6);
            background: rgba(99, 220, 174, 0.1);
        }

        .mode-btn.active .material-symbols-outlined {
            color: #63dcae;
        }

        .mode-btn.active span:last-child {
            color: #63dcae;
        }

        /* Filter themes by mode */
        .theme-item.hidden {
            display: none;
        }

        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined', 'Material Icons', 'Google Sans', sans-serif;
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            font-feature-settings: 'liga' 1, 'clig' 1;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Hide scrollbar for mobile horizontal scroll */
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        /* Smooth scrolling for ministries section on mobile */
        @media (max-width: 768px) {
            section.mt-10.overflow-x-auto {
                -webkit-overflow-scrolling: touch;
            }
        }

        .monolith-blur {
            backdrop-filter: blur(20px);
            background: rgba(19, 19, 19, 0.8);
        }

        .emerald-glow:focus-within {
            box-shadow: 0 0 15px rgba(99, 220, 174, 0.2);
            border-color: rgba(99, 220, 174, 0.4);
        }

        .glass-widget {
            background: rgba(28, 27, 27, 0.4);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(134, 148, 140, 0.1);
        }

        .glass-button {
            background: rgba(28, 27, 27, 0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(134, 148, 140, 0.15);
        }

        /* ===== CSS FALLBACK HORS-LIGNE ===== */
        /* Si Tailwind n'est pas chargé, ces styles assurent l'affichage minimal */
        :root {
            --bg: #131313;
            --surface-low: #1c1b1b;
            --surface: #201f1f;
            --primary: #63dcae;
            --on-surface: #e5e2e1;
            --on-surface-variant: #bccac1;
        }
        body {
            background-color: var(--bg);
            color: var(--on-surface);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* Assure que les liens de raccourcis n'ont pas de style par défaut */
        a.no-underline {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Theme background gradients */
        .bg-gradient-light {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
        }

        .bg-gradient-dark {
            background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);
        }
    </style>
</head>
